# CKB Devnet Node Configuration
# This configuration is optimized for local development.

[ckb]
data_dir = "/var/lib/ckb/data"

[logger]
filter = "info"
color = true
log_to_file = true
log_to_stdout = true

[chain]
# Use the dev chain spec for local development
spec = { bundled = "specs/dev.toml" }

[block_assembler]
# Default miner lock args — replace with your dev address args
code_hash = "0x9bd7e06f3ecf4be0f2fcd2188b23f1b9fcc88e5d4b65a8637b17723bbda3cce8"
hash_type = "type"
args = "0x0000000000000000000000000000000000000000"
message = "0x"

[rpc]
listen_address = "0.0.0.0:8114"
max_request_body_size = 10485760
# Enable all RPC modules for development
modules = [
    "Net",
    "Pool",
    "Miner",
    "Chain",
    "Stats",
    "Subscription",
    "Experiment",
    "Debug",
    "Indexer",
    "IntegrationTest",
]

[network]
listen_addresses = ["/ip4/0.0.0.0/tcp/8115"]
max_peers = 8
max_outbound_peers = 4

[tx_pool]
max_tx_pool_size = 180_000_000
min_fee_rate = 1_000

[db]
options_file = "default.db-options"
